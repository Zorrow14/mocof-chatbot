<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MOCOF Chat</title>
<style>
  *, *::before, *::after {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
  }

  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont,
                 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  }

  /* ══════════════════════════════════════
     FLOATING LAUNCHER BUTTON
  ══════════════════════════════════════ */
  .launcher {
    position: fixed;
    bottom: 28px; right: 28px;
    width: 58px; height: 58px;
    border-radius: 50%;
    background: #1A1A2E;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.30);
    z-index: 99999;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    outline: none;
  }
  .launcher:hover {
    transform: scale(1.09);
    box-shadow: 0 6px 30px rgba(0,0,0,0.36);
  }
  .launcher:active { transform: scale(0.94); }

  .l-icon {
    position: absolute;
    width: 25px; height: 25px;
    transition: opacity 0.18s ease, transform 0.18s ease;
  }
  .l-icon.show { opacity: 1; transform: scale(1) rotate(0deg); }
  .l-icon.hide { opacity: 0; transform: scale(0.5) rotate(90deg); pointer-events: none; }

  .unread {
    position: absolute; top: 2px; right: 2px;
    width: 14px; height: 14px; border-radius: 50%;
    background: #C9A96E; border: 2.5px solid transparent;
    display: none;
  }
  .unread.show { display: block; }

  /* ══════════════════════════════════════
     CHAT POPUP WINDOW
  ══════════════════════════════════════ */
  .chat-popup {
    position: fixed;
    bottom: 96px; right: 28px;
    width: 350px; height: 520px;
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 10px 50px rgba(0,0,0,0.20), 0 2px 12px rgba(0,0,0,0.10);
    display: flex; flex-direction: column; overflow: hidden;
    z-index: 99998;
    opacity: 0;
    transform: scale(0.88) translateY(16px);
    pointer-events: none;
    transition: opacity 0.22s ease,
                transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
    transform-origin: bottom right;
  }
  .chat-popup.open {
    opacity: 1;
    transform: scale(1) translateY(0);
    pointer-events: all;
  }

  /* ── HEADER ── */
  .header {
    background: #1A1A2E; padding: 12px 14px;
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  .hav {
    width: 38px; height: 38px; border-radius: 50%; background: #C9A96E;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; color: #1A1A2E;
    flex-shrink: 0; user-select: none;
  }
  .hinfo { flex: 1; min-width: 0; }
  .hname { font-size: 14px; font-weight: 600; color: #fff; }
  .hsub  { font-size: 10.5px; color: #9E9EBF; margin-top: 2px; }
  .hright { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .odot {
    width: 8px; height: 8px; border-radius: 50%; background: #4CAF50;
    box-shadow: 0 0 0 2px rgba(76,175,80,0.25);
  }
  .hclose {
    background: rgba(255,255,255,0.12); border: none; border-radius: 6px;
    width: 28px; height: 28px; display: flex; align-items: center;
    justify-content: center; cursor: pointer; transition: background 0.15s;
  }
  .hclose:hover { background: rgba(255,255,255,0.22); }
  .hclose svg { width: 13px; height: 13px; stroke: #fff; }

  /* ── MESSAGES ── */
  .msgs {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 13px 11px 8px; background: #F5F5F7;
    display: flex; flex-direction: column; gap: 10px;
    scroll-behavior: smooth;
  }
  .msgs::-webkit-scrollbar { width: 3px; }
  .msgs::-webkit-scrollbar-thumb { background: #D1D1D6; border-radius: 2px; }

  .mrow {
    display: flex; align-items: flex-end; gap: 7px;
    animation: pop 0.22s ease forwards;
  }
  .mrow.user { flex-direction: row-reverse; }

  @keyframes pop {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .mav {
    width: 24px; height: 24px; border-radius: 50%; background: #C9A96E;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; color: #1A1A2E;
    flex-shrink: 0; margin-bottom: 2px; user-select: none;
  }

  /* ✨ FIX: The column now controls the max-width, keeping it clean */
  .mcol { 
    display: flex; 
    flex-direction: column; 
    max-width: 80%; 
  }
  .mrow.user .mcol { 
    align-items: flex-end; 
  }

  /* ✨ FIX: max-content forces "Hello" to stay on one line, max-width keeps paragraphs from breaking out */
  .bubble {
    width: max-content; 
    max-width: 100%; 
    padding: 9px 13px; 
    font-size: 13px;
    line-height: 1.57; 
    white-space: pre-wrap;
    word-break: normal;
    overflow-wrap: anywhere;
  }
  
  .bubble.bot {
    background: #fff; color: #1A1A2E;
    border-radius: 3px 14px 14px 14px;
    border: 0.5px solid #E5E5EA;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .bubble.user {
    background: #1A1A2E; color: #fff;
    border-radius: 14px 3px 14px 14px;
  }
  .mtime { font-size: 10px; color: #AEAEB2; margin-top: 3px; padding: 0 3px; }

  /* ── TYPING ── */
  .trow { display: flex; align-items: flex-end; gap: 7px; }
  .tbbl {
    background: #fff; border: 0.5px solid #E5E5EA;
    border-radius: 3px 14px 14px 14px;
    padding: 11px 14px; display: flex; gap: 5px; align-items: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .tdot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #C9A96E; opacity: 0.4;
    animation: td 1.3s ease infinite;
  }
  .tdot:nth-child(2) { animation-delay: 0.18s; }
  .tdot:nth-child(3) { animation-delay: 0.36s; }
  @keyframes td {
    0%,60%,100% { transform: translateY(0);   opacity: 0.4; }
    30%         { transform: translateY(-5px); opacity: 1;   }
  }

  /* ── QUICK ACTIONS ── */
  .qbar {
    background: #fff; border-top: 1px solid #E5E5EA;
    padding: 7px 9px; display: flex; gap: 5px;
    flex-wrap: wrap; flex-shrink: 0;
  }
  .qbtn {
    font-size: 11px; padding: 5px 9px; border-radius: 20px;
    border: 0.5px solid #AFA9EC; background: #F0EEF8; color: #3C3489;
    cursor: pointer; white-space: nowrap; font-family: inherit;
    line-height: 1.2; transition: background 0.15s, color 0.15s, transform 0.1s;
  }
  .qbtn:hover:not(:disabled) { background: #3C3489; color: #fff; border-color: #3C3489; }
  .qbtn:active:not(:disabled) { transform: scale(0.96); }
  .qbtn:disabled { opacity: 0.45; cursor: not-allowed; }

  /* ── INPUT BAR ── */
  .ibar {
    background: #fff; border-top: 1px solid #E5E5EA;
    padding: 9px 10px; display: flex; align-items: flex-end;
    gap: 8px; flex-shrink: 0;
  }
  .minput {
    flex: 1; background: #F5F5F7; border: 1px solid #E5E5EA;
    border-radius: 20px; padding: 8px 14px; font-size: 13px;
    font-family: inherit; color: #1A1A2E; outline: none;
    resize: none; line-height: 1.45; max-height: 72px;
    overflow-y: auto; transition: border-color 0.15s, background 0.15s;
    scrollbar-width: none;
  }
  .minput::-webkit-scrollbar { display: none; }
  .minput::placeholder { color: #AEAEB2; }
  .minput:focus { border-color: #C9A96E; background: #fff; }
  .minput:disabled { opacity: 0.5; }

  .sbtn {
    width: 36px; height: 36px; border-radius: 50%; background: #1A1A2E;
    border: none; cursor: pointer; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  .sbtn:hover:not(:disabled) { background: #2D2D4E; }
  .sbtn:active:not(:disabled) { transform: scale(0.91); }
  .sbtn:disabled { opacity: 0.4; cursor: not-allowed; }
  .sbtn svg { width: 15px; height: 15px; fill: #C9A96E; }

  /* ── MOBILE ── */
  @media (max-width: 480px) {
    .chat-popup { width: calc(100vw - 16px); height: calc(100vh - 110px); right: 8px; bottom: 86px; }
    .launcher   { bottom: 20px; right: 16px; }
  }
</style>
</head>
<body>

<button class="launcher" id="launcher" onclick="toggleChat()" aria-label="Chat with MOCOF">
  <span class="unread" id="badge"></span>
  <svg class="l-icon show" id="ico-open" viewBox="0 0 24 24" fill="none">
    <path d="M4 4h16a1 1 0 011 1v10a1 1 0 01-1 1H8l-4 4V5a1 1 0 011-1z"
          stroke="#C9A96E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <svg class="l-icon hide" id="ico-close" viewBox="0 0 24 24" fill="none">
    <path d="M18 6L6 18M6 6l12 12" stroke="#C9A96E" stroke-width="2" stroke-linecap="round"/>
  </svg>
</button>

<div class="chat-popup" id="chatPopup" role="dialog" aria-label="MOCOF Chat">

  <div class="header">
    <div class="hav" aria-hidden="true">M</div>
    <div class="hinfo">
      <div class="hname">Moco</div>
      <div class="hsub">MOCOF AI Consultant</div>
    </div>
    <div class="hright">
      <div class="odot"></div>
      <button class="hclose" onclick="toggleChat()" aria-label="Close chat">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6l12 12" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="msgs" id="msgs" role="log" aria-live="polite"></div>

  <div class="qbar">
    <button class="qbtn" onclick="sendQ('Tell me about your wall bed products.')">🛏️ Wall Beds</button>
    <button class="qbtn" onclick="sendQ('I am interested in a home renovation. Can you help me?')">🏠 Renovation</button>
    <button class="qbtn" onclick="sendQ('Where are your showrooms and opening hours?')">📍 Showrooms</button>
    <button class="qbtn" onclick="sendQ('What warranty do you offer on your products?')">🛡️ Warranty</button>
  </div>

  <div class="ibar">
    <textarea class="minput" id="minput" placeholder="Type a message..."
              rows="1" maxlength="600" aria-label="Chat input"></textarea>
    <button class="sbtn" id="sbtn" onclick="doSend()" aria-label="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
'use strict';

/* ── Config ──────────────────────────────────────────── */
// API endpoint — automatically uses the same domain
var API_URL = 'https://mocof-chatbot.vercel.app/api/chat';

/* ── State ───────────────────────────────────────────── */
var isOpen      = false;
var isBusy      = false;
var chatHistory = []; 

/* ── DOM ─────────────────────────────────────────────── */
var popup   = document.getElementById('chatPopup');
var msgs    = document.getElementById('msgs');
var minput  = document.getElementById('minput');
var sbtn    = document.getElementById('sbtn');
var badge   = document.getElementById('badge');
var icoOpen = document.getElementById('ico-open');
var icoCls  = document.getElementById('ico-close');
var qbtns   = document.querySelectorAll('.qbtn');

/* ── Init ────────────────────────────────────────────── */
window.addEventListener('load', function () {
  welcome();
  initInput();
});

/* ── Toggle ──────────────────────────────────────────── */
function toggleChat() {
  isOpen = !isOpen;
  popup.classList.toggle('open', isOpen);
  icoOpen.className = 'l-icon ' + (isOpen ? 'hide' : 'show');
  icoCls.className  = 'l-icon ' + (isOpen ? 'show' : 'hide');
  badge.classList.remove('show');
  if (isOpen) setTimeout(function () { minput.focus(); }, 320);
}

/* ── Welcome ─────────────────────────────────────────── */
function welcome() {
  addBot(
    'Hi there! 👋 I\'m Moco, your MOCOF design consultant.\n\n' +
    'I can help you with:\n' +
    '• Wall beds & sofa beds\n' +
    '• Home renovation advice\n' +
    '• Product recommendations\n' +
    '• Showroom locations & hours\n\n' +
    'What can I help you with today?'
  );
}

/* ── Input setup ─────────────────────────────────────── */
function initInput() {
  minput.addEventListener('input', function () {
    minput.style.height = 'auto';
    minput.style.height = Math.min(minput.scrollHeight, 72) + 'px';
  });
  minput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
  });
}

/* ── Send handlers ───────────────────────────────────── */
function doSend() {
  if (isBusy) return;
  var txt = minput.value.trim();
  if (!txt) return;
  minput.value = '';
  minput.style.height = 'auto';
  process(txt);
}

function sendQ(txt) {
  if (isBusy) return;
  if (!isOpen) toggleChat();
  setTimeout(function () { process(txt); }, isOpen ? 0 : 360);
}

/* ── Core: sends to /api/chat ────────────────────────── */
async function process(txt) {
  addUser(txt);
  setBusy(true);
  showTyping();

  chatHistory.push({ role: 'user', content: txt });
  if (chatHistory.length > 40) chatHistory = chatHistory.slice(-40);

  try {
    var res = await fetch(API_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ message: txt, history: chatHistory })
    });

    if (!res.ok) console.error('HTTP error:', res.status, res.statusText);
    var data = await res.json();

    hideTyping();

    if (data.success && data.message) {
      addBot(data.message);
      chatHistory.push({ role: 'assistant', content: data.message });
    } else {
      console.error('API error response:', JSON.stringify(data));
      addBot('I’m sorry, something went wrong. Please try again or visit one of our showrooms!');
    }

  } catch (err) {
    console.error('Chat error:', err);
    hideTyping();
    addBot('I’m sorry, I couldn’t connect. Please check your connection or visit us in person!');
  }

  setBusy(false);
  if (!isOpen) badge.classList.add('show');
}

/* ── Bubbles ─────────────────────────────────────────── */
function addUser(txt) {
  var row = document.createElement('div');
  row.className = 'mrow user';
  row.innerHTML =
    '<div class="mcol">' +
      '<div class="bubble user">' + esc(txt) + '</div>' +
      '<div class="mtime">' + now() + '</div>' +
    '</div>';
  msgs.appendChild(row);
  scrollDown();
}

function addBot(txt) {
  var row = document.createElement('div');
  row.className = 'mrow bot';
  row.innerHTML =
    '<div class="mav" aria-hidden="true">M</div>' +
    '<div class="mcol">' +
      '<div class="bubble bot">' + esc(txt) + '</div>' +
      '<div class="mtime">Moco · ' + now() + '</div>' +
    '</div>';
  msgs.appendChild(row);
  scrollDown();
}

/* ── Typing indicator ────────────────────────────────── */
function showTyping() {
  if (document.getElementById('tr')) return;
  var row = document.createElement('div');
  row.className = 'trow'; row.id = 'tr';
  row.innerHTML =
    '<div class="mav" aria-hidden="true">M</div>' +
    '<div class="tbbl">' +
      '<div class="tdot"></div><div class="tdot"></div><div class="tdot"></div>' +
    '</div>';
  msgs.appendChild(row);
  scrollDown();
}
function hideTyping() { var r = document.getElementById('tr'); if (r) r.remove(); }

/* ── Helpers ─────────────────────────────────────────── */
function setBusy(v) {
  isBusy = v; sbtn.disabled = v; minput.disabled = v;
  qbtns.forEach(function (b) { b.disabled = v; });
}
function scrollDown() {
  setTimeout(function () { msgs.scrollTop = msgs.scrollHeight; }, 55);
}
function now() {
  var d = new Date(), h = d.getHours(), m = d.getMinutes();
  var a = h >= 12 ? 'PM' : 'AM';
  return (h % 12 || 12) + ':' + (m < 10 ? '0' : '') + m + ' ' + a;
}
function esc(t) {
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/\n/g,'<br>');
}
</script>
</body>
</html>
